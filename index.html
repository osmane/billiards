<!doctype html>
<html lang="en">
  <head>
    <title>break builder</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta
      name="description"
      content="An open source pool and billiards simulation game developed by osmane."
    />
    <meta
      name="keywords"
      content="billiards, pool, snooker, open source, game, osmane"
    />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta http-equiv="Permissions-Policy" content="interest-cohort=()" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"
    />
    <link rel="stylesheet" type="text/css" href="index.css" />
    <style>
      .elevationIndicator {
        position: absolute;
        bottom: 10px;
        right: 10px;
        background: rgba(0, 0, 0, 0.7);
        color: #fff;
        padding: 5px 10px;
        border-radius: 5px;
        font-size: 14px;
        font-family: monospace;
        pointer-events: none;
        z-index: 100;
      }
      .elevationIndicator span {
        font-weight: bold;
        color: #4CAF50;
      }
      .presetContainer {
        position: absolute;
        bottom: 50px;
        right: 10px;
        background: rgba(0, 0, 0, 0.7);
        padding: 8px;
        border-radius: 5px;
        z-index: 100;
      }
      .presetContainer label {
        color: #fff;
        font-size: 12px;
        font-family: monospace;
        display: block;
        margin-bottom: 4px;
      }
      .piquePresetDropdown {
        width: 220px;
        padding: 4px;
        font-size: 12px;
        font-family: monospace;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid #4CAF50;
        border-radius: 3px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div id="viewP1" class="view3d">
      <div id="snookerScoreOverlay"><div id="snookerScore"></div></div>
    </div>
    <div id="scoreHighlightLeft" class="scoreHighlight" aria-hidden="true"></div>
    <div id="scoreHighlightRight" class="scoreHighlight" aria-hidden="true"></div>
    <div class="panel">
      <button class="hitButton" id="cueHit" type="button">hit</button>
      <div class="ballContainer">
        <div id="objectBall" class="objectBall"></div>
        <div id="cueBall" class="cueBall">
          <div id="cueTip" class="cueTip"></div>
        </div>
      </div>
      <input
        class="powerSlider"
        type="range"
        orient="vertical"
        min="0"
        max="1"
        step="0.01"
        value="0.7"
        id="cuePower"
        aria-label="power slider"
      />
      <div id="elevationIndicator" class="elevationIndicator" title="Cue Elevation (PageUp/PageDown)">
        <span id="elevationValue">0°</span>
      </div>
      <div class="presetContainer">
        <label for="piquePreset">Piqué Preset:</label>
        <select id="piquePreset" class="piquePresetDropdown">
          <option value="">-- Select Preset --</option>
          <option value="T1">Piqué: 75° - Center Strike</option>
          <option value="T2">Piqué: 75° - Slight Right Curve</option>
          <option value="T3">Piqué: 75° - Strong Right Curve</option>
          <option value="T4">Piqué: 75° - Slight Left Curve</option>
          <option value="T5">Piqué: 75° - Strong Left Curve</option>
          <option value="T6">Piqué: 65° - Center Strike</option>
          <option value="T7">Piqué: 65° - Slight Right Curve</option>
          <option value="T8">Piqué: 65° - Strong Right Curve</option>
          <option value="T9">Piqué: 65° - Slight Left Curve</option>
          <option value="T10">Piqué: 65° - Strong Left Curve</option>
        </select>
      </div>
      <div class="chatarea">
        <div id="chatoutput" class="chatoutput">
          <button type="button" id="customBtnLeft" class="menuButton menuButton--large scoreButton scoreButton--white" title="White Score">0</button>
          <button type="button" id="customBtnRight" class="menuButton menuButton--large scoreButton scoreButton--yellow" title="Yellow Score">0</button>
          <a href="https://github.com/osmane/billiards" title="Github">★</a>
          <a
            href="https://scoreboard-osmane-billiards.vercel.app/leaderboard.html"
            target="_blank"
            title="High Break Table"
            >🏆</a
          >
          <a
            href="https://scoreboard-osmane-billiards.vercel.app/lobby"
            target="_blank"
            class="pill"
            title="Lobby"
            id="lobby"
            >👥</a
          >
        </div>
        <div class="outerMenu">
          <button class="menuButton" title="share" id="share" type="submit">
            ⬀
          </button>
          <button class="menuButton" title="replay" id="replay" type="submit">
            ↻
          </button>
          <button class="menuButton" title="retry" id="redo" type="submit">
            ⎌
          </button>
          <button class="menuButton" title="view" id="camera" type="submit">
            🎥
          </button>
          <button class="targetButton" title="target" id="targetButton" type="submit">
            🎯
          </button>
        </div>
      </div>
    </div>
    <div class="constants" id="constants">
      <p>Physical Constants</p>
      <div class="nw">
        <input id="R" type="range" /><label for="R">R</label>
      </div>
      <div class="nw">
        <input id="m" type="range" /><label for="m">m</label>
      </div>
      <div class="nw">
        <input id="e" type="range" /><label for="e">e</label>
      </div>
      <div class="nw">
        <input id="mu" type="range" /><label for="mu">mu</label>
      </div>
      <div class="nw">
        <input id="muS" type="range" /><label for="muS">muS</label>
      </div>
      <div class="nw">
        <input id="muC" type="range" /><label for="muC">muC</label>
      </div>
      <div class="nw">
        <input id="rho" type="range" /><label for="rho">rho</label>
      </div>
      <div class="nw">
        <button id="network">network🗲</button>
      </div>
    </div>    
  </body>
</html>

<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <title>İki Küre: Mercek Kalınlığı Görselleştirme (Three.js)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body { height: 100%; margin: 0; background:#0b0f14; color:#e7eef7; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Apple Color Emoji","Segoe UI Emoji";}
    #app { position: fixed; inset: 0; }
    .panel {
      position: fixed; top: 16px; left: 16px; width: 320px;
      background: rgba(20,26,34,0.85); border: 1px solid #1e2733; border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.35); padding: 14px 16px; backdrop-filter: blur(6px);
    }
    .panel h1 { font-size: 16px; margin: 0 0 8px 0; letter-spacing: .3px; color:#cfe6ff;}
    .row { margin: 10px 0; }
    label { display:block; font-size: 12px; color:#9fb3c8; margin-bottom: 6px;}
    input[type="range"] { width: 100%; }
    .stats {
      display:grid; grid-template-columns: 1fr auto; gap: 6px 10px; font-size: 13px; margin-top: 8px;
      background: #10161d; border:1px solid #1b2531; border-radius:12px; padding:10px;
    }
    .k { color:#9fb3c8; }
    .v { color:#f5faff; font-variant-numeric: tabular-nums; }
    .hint { font-size: 11px; color:#89a3bb; margin-top:8px; }
    a { color:#7fd5ff; text-decoration: none; }
  </style>
</head>
<body>
  <div id="app"></div>

  <div class="panel">
    <h1>İki Küre – Mercek Kalınlığı</h1>
    <div class="row">
      <label for="dRange">Merkezler arası mesafe d (cm)</label>
      <input id="dRange" type="range" min="0" max="12" step="0.1" value="6">
    </div>
    <div class="stats">
      <div class="k">Yarıçap r</div><div class="v" id="rVal">5.00 cm</div>
      <div class="k">d</div><div class="v" id="dVal">6.00 cm</div>
      <div class="k">Mercek kalınlığı t = max(0, 2r - d)</div><div class="v" id="tVal">4.00 cm</div>
    </div>
    <div class="hint">
      Küreler yarı-şeffaftır; yeşil çubuk mercek kalınlığını gösterir. Fare ile sahneyi döndürebilir ve yakınlaştırabilirsin.
    </div>
  </div>

  <!-- Three.js & eklentiler -->
  <script type="module">
    import * as THREE from './libs/three.module.js';
    import { OrbitControls } from './libs/OrbitControls.js';

    // === Parametreler (cm biriminde) ===
    const r = 5;               // küre yarıçapı (cm)
    let d = 6;                 // merkezler arası mesafe (cm) — kaydırıcı kontrol eder
    const canShowBarWhenOverlapOnly = true;

    // === Temel kurulum ===
    const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById("app").appendChild(renderer.domElement);

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(18, 12, 20);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.minDistance = 8;
    controls.maxDistance = 80;
    controls.target.set(0, 0, 0);

    // === Işıklar ===
    scene.add(new THREE.AmbientLight(0xffffff, 0.35));
    const dir = new THREE.DirectionalLight(0xffffff, 1.0);
    dir.position.set(10, 15, 12);
    dir.castShadow = false;
    scene.add(dir);

    // === Zemin grid (hafif) ===
    const grid = new THREE.GridHelper(120, 60, 0x22303f, 0x16202b);
    grid.material.opacity = 0.25;
    grid.material.transparent = true;
    scene.add(grid);

    // === Küreler ===
    const sphereGeo = new THREE.SphereGeometry(r, 64, 64);

    const leftMat  = new THREE.MeshPhysicalMaterial({
      color: 0x3aa6ff, metalness: 0.0, roughness: 0.2, transparent: true, opacity: 0.45,
      transmission: 0.0, side: THREE.DoubleSide
    });
    const rightMat = new THREE.MeshPhysicalMaterial({
      color: 0xff5a7d, metalness: 0.0, roughness: 0.2, transparent: true, opacity: 0.45,
      transmission: 0.0, side: THREE.DoubleSide
    });

    const leftSphere = new THREE.Mesh(sphereGeo, leftMat);
    const rightSphere = new THREE.Mesh(sphereGeo, rightMat);
    scene.add(leftSphere, rightSphere);

    // === Mercek kalınlığı çubuğu (neon yeşil) ===
    // Y ekseni boyunca yükseklik=1 olan silindir; sonra X eksenine yatırıp scale.y = t yapacağız.
    const barRadius = 0.15 * (r/5);  // r ile orantılı ince bir çubuk
    const barGeo = new THREE.CylinderGeometry(barRadius, barRadius, 1, 24, 1, true);
    const neonGreen = 0x39ff14;
    const barMat = new THREE.MeshStandardMaterial({
      color: neonGreen,
      emissive: neonGreen,
      emissiveIntensity: 1.2,
      metalness: 0.2,
      roughness: 0.4,
      transparent: true,
      opacity: 0.95
    });
    const bar = new THREE.Mesh(barGeo, barMat);
    bar.rotation.z = Math.PI / 2; // Y eksenindeki silindiri X eksenine yatır
    scene.add(bar);

    // Uç noktaları küçük "cap" kürelerle belirtelim (isteğe bağlı, okunurluk için)
    const tipGeo = new THREE.SphereGeometry(barRadius*1.4, 16, 16);
    const tipMat = new THREE.MeshStandardMaterial({ color: neonGreen, emissive: neonGreen, emissiveIntensity: 1.0 });
    const tipL = new THREE.Mesh(tipGeo, tipMat);
    const tipR = new THREE.Mesh(tipGeo, tipMat);
    scene.add(tipL, tipR);

    // === UI bağlama ===
    const dRange = document.getElementById("dRange");
    const rVal   = document.getElementById("rVal");
    const dVal   = document.getElementById("dVal");
    const tVal   = document.getElementById("tVal");
    rVal.textContent = `${r.toFixed(2)} cm`;

    dRange.addEventListener("input", () => {
      d = parseFloat(dRange.value);
      updateScene();
    });

    // === Hesap ve yerleşim ===
    function updateScene() {
      // Küre merkezlerini yerleştir (x ekseni boyunca +/- d/2)
      leftSphere.position.set(-d/2, 0, 0);
      rightSphere.position.set(d/2, 0, 0);

      // Tepe noktaları (içe bakan uçlar) – x ekseninde:
      const xLeftTip  = -d/2 + r;  // soldaki kürenin sağa bakan iç ucu
      const xRightTip =  d/2 - r;  // sağdaki kürenin sola bakan iç ucu

      // Mercek kalınlığı: t = max(0, 2r - d)
      const t = Math.max(0, 2*r - d);

      // Çubuk (hep orijinde merkezli; uzunluğu t)
      const showBar = !canShowBarWhenOverlapOnly || t > 1e-6;
      bar.visible = showBar;
      tipL.visible = showBar;
      tipR.visible = showBar;

      if (showBar) {
        bar.scale.set(1, t, 1);     // başlangıç yüksekliği 1 idi; y ekseninde t'ye ölçekledik (çubuk X eksenine yatırıldığı için bu "uzunluk" oluyor)
        bar.position.set(0, 0, 0);  // merkez hep orijin

        // Uç işaretleri
        tipL.position.set(Math.min(xLeftTip, xRightTip), 0, 0);
        tipR.position.set(Math.max(xLeftTip, xRightTip), 0, 0);
      }

      // Sayısal gösterge
      dVal.textContent = `${d.toFixed(2)} cm`;
      tVal.textContent = `${t.toFixed(2)} cm`;
    }

    // İlk çizim
    updateScene();

    // === Render döngüsü ===
    function animate() {
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    animate();

    // === Yeniden boyutlandırma ===
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>

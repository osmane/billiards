<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<title>Küre — X Ekseni Rotasyonu</title>
<style>
  body {
    display:flex;
    height:100vh;
    align-items:center;
    justify-content:center;
    background:linear-gradient(rgb(0, 64, 94), #000214);
    margin:0;
    font-family: Arial, sans-serif;
  }
  canvas { display:block; background:#000; border-radius:6px; }
  .container {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .slider-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 500px;
    justify-content: space-between;
  }
  .slider-label {
    color: #fff;
    font-size: 14px;
    font-weight: bold;
  }
  input[type="range"] {
    writing-mode: bt-lr;
    -webkit-appearance: slider-vertical;
    width: 8px;
    height: 440px;
    padding: 0;
  }
</style>
</head>
<body>
  <div class="container">
    <canvas id="c" width="500" height="500"></canvas>
    <div class="slider-container">
      <div class="slider-label">90</div>
      <input type="range" id="slider" min="0" max="90" value="0" orient="vertical">
      <div class="slider-label">0</div>
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { alpha: false });
  const slider = document.getElementById('slider');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2;
  const radius = Math.min(W, H) * 0.42 | 0;

  let pitch = Math.PI / 2;
  let hitPoint = [0, 0, 1];
  let targetPoint = [0, 0, 1];

  const hitPointRatio = 0.021; // %3 * 0.7 = 0.021
  const targetPointRatio = 0.003; // %1 * 0.3 = 0.003
  const greyRatio = 0.75; // Gri alan %75
  const blendWidth = hitPointRatio * 2 * 1.2; // Vuruş noktası çapı kadar gradyan + %20

  // Işık kaynağı: sağ üst, biraz kamera tarafında
  const lightDir = [0.6, -0.7, 0.4]; // Sağ, üst, öne
  const lightLen = Math.sqrt(lightDir[0]**2 + lightDir[1]**2 + lightDir[2]**2);
  const lightNorm = [lightDir[0]/lightLen, lightDir[1]/lightLen, lightDir[2]/lightLen];
  const ambientLight = 0.35; // Minimum ışık seviyesi
  const diffuseLight = 0.65; // Işık etkisi

  function applyLighting(color, normal) {
    // Diffuse lighting (Lambertian)
    const dotProduct = Math.max(0, 
      normal[0] * lightNorm[0] + 
      normal[1] * lightNorm[1] + 
      normal[2] * lightNorm[2]
    );
    
    const intensity = ambientLight + diffuseLight * dotProduct;
    
    return [
      Math.min(255, color[0] * intensity),
      Math.min(255, color[1] * intensity),
      Math.min(255, color[2] * intensity)
    ];
  }

  slider.addEventListener('input', e => {
    const degrees = parseFloat(e.target.value);
    pitch = Math.PI / 2 - (degrees * Math.PI) / 180;
    
    // Vuruş noktasını kontrol et ve gerekirse beyaz alana it
    hitPoint = pushToWhiteArea(hitPoint);
    
    drawSphere();
  });

  let isDragging = false;

  canvas.addEventListener('mousedown', e => {
    isDragging = true;
    updateHitPoint(e);
  });

  canvas.addEventListener('mouseup', () => {
    isDragging = false;
  });

  canvas.addEventListener('mouseleave', () => {
    isDragging = false;
  });

  canvas.addEventListener('mousemove', e => {
    if (isDragging) {
      updateHitPoint(e);
    }
  });

  canvas.addEventListener('click', e => {
    updateHitPoint(e);
  });

  function updateHitPoint(e) {
    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;
    
    const px = mouseX - cx;
    const py = mouseY - cy;
    const r2 = radius * radius;
    
    if (px*px + py*py <= r2) {
      const z = Math.sqrt(Math.max(0, r2 - px*px - py*py));
      const nx = px / radius;
      const ny = py / radius;
      const nz = z / radius;
      
      const clickedPoint = [nx, ny, nz];
      
      // Sadece beyaz alanda ise kabul et
      if (isInWhiteArea(clickedPoint)) {
        hitPoint = clickedPoint;
        drawSphere();
      }
    }
  }

  function rotateX(v, pitch) {
    const sx = Math.sin(pitch), cx = Math.cos(pitch);
    const x = v[0];
    const y = cx*v[1] - sx*v[2];
    const z = sx*v[1] + cx*v[2];
    return [x, y, z];
  }

  function smoothstep(edge0, edge1, x) {
    let t = (x - edge0) / (edge1 - edge0);
    t = Math.max(0, Math.min(1, t));
    return t * t * (3 - 2 * t);
  }

  // Bir noktanın beyaz alanda mı gri alanda mı olduğunu kontrol et
  function isInWhiteArea(point) {
    const [rx, ry, rz] = rotateX(point, pitch);
    const tRaw = (ry + 1) * 0.5;
    const threshold = 1 - greyRatio; // 0.35
    return tRaw < threshold; // Beyaz alanda ise true
  }

  // Vuruş noktasını beyaz alana it
  function pushToWhiteArea(point) {
    const [rx, ry, rz] = rotateX(point, pitch);
    const tRaw = (ry + 1) * 0.5;
    const threshold = 1 - greyRatio;
    
    if (tRaw >= threshold) {
      // Gri alanda, beyaz alana doğru it
      // Y koordinatını azalt (threshold'a yaklaştır)
      const targetTRaw = threshold - 0.02; // Biraz içeride
      const targetRY = targetTRaw * 2 - 1;
      
      // Ters rotasyon uygula
      const sx = Math.sin(pitch), cx = Math.cos(pitch);
      const newY = cx * targetRY + sx * rz;
      const newZ = -sx * targetRY + cx * rz;
      
      // Normalize et (küre yüzeyinde tut)
      const len = Math.sqrt(rx*rx + newY*newY + newZ*newZ);
      return [rx/len, newY/len, newZ/len];
    }
    
    return point;
  }

  function drawSphere() {
    const gradient = ctx.createLinearGradient(0, 0, 0, H);
    gradient.addColorStop(0, 'rgb(0, 64, 94)');
    gradient.addColorStop(1, '#000214');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, W, H);
    
    const img = ctx.createImageData(W, H);
    const data = img.data;
    const r2 = radius * radius;
    
    // Tüm canvas'ı vuruş noktası rengiyle doldur (arkaplan)
    const bgColor = [0, 64, 94];
    for (let i = 0; i < data.length; i += 4) {
      data[i] = bgColor[0];
      data[i + 1] = bgColor[1];
      data[i + 2] = bgColor[2];
      data[i + 3] = 255;
    }

    for (let py = -radius; py <= radius; py++) {
      const y = py;
      const scanY = cy + y | 0;
      if (scanY < 0 || scanY >= H) continue;

      const maxX = Math.floor(Math.sqrt(Math.max(0, r2 - y*y)));
      for (let px = -maxX; px <= maxX; px++) {
        const x = px;
        const scanX = cx + x | 0;
        const z = Math.sqrt(Math.max(0, r2 - x*x - y*y));

        let nx = x / radius;
        let ny = y / radius;
        let nz = z / radius;

        // Beyaz-gri desen için rotasyon uygula
        const [rx, ry, rz] = rotateX([nx, ny, nz], pitch);

        // Kırmızı ve mavi noktalar için rotasyonsuz koordinatları kullan (ekranda sabit kalırlar)
        const dotHit = nx * hitPoint[0] + ny * hitPoint[1] + nz * hitPoint[2];
        const hitThreshold = 1 - hitPointRatio * 2;
        
        const dotTarget = nx * targetPoint[0] + ny * targetPoint[1] + nz * targetPoint[2];
        const targetThreshold = 1 - targetPointRatio * 2;
        
        let r, g, b;
        
        if (dotHit >= hitThreshold) {
          // Mavi vuruş noktası - gradyanlı
          const hitColor = [0, 64, 94];
          const edgeFade = (dotHit - hitThreshold) / (1 - hitThreshold); // 0 kenarda, 1 merkezde
          const t = smoothstep(0, 0.3, edgeFade); // Gradyan etkisi
          
          // Normal renk al
          let tRaw = (ry + 1) * 0.5;
          const threshold = 1 - greyRatio;
          const whiteColor = [217, 217, 217]; // %15 daha koyu beyaz
          const greyColor = [144, 144, 144]; // %20 daha açık gri
          const tBlend = smoothstep(threshold - blendWidth, threshold, tRaw);
          const baseR = whiteColor[0]*(1-tBlend) + greyColor[0]*tBlend;
          const baseG = whiteColor[1]*(1-tBlend) + greyColor[1]*tBlend;
          const baseB = whiteColor[2]*(1-tBlend) + greyColor[2]*tBlend;
          
          // Gradyanlı karışım
          r = baseR * (1-t) + hitColor[0] * t;
          g = baseG * (1-t) + hitColor[1] * t;
          b = baseB * (1-t) + hitColor[2] * t;
        } else {
          // Normal boyama: döndürülmüş yükseklik bazlı
          let tRaw = (ry + 1) * 0.5;
          const threshold = 1 - greyRatio;
          
          const whiteColor = [217, 217, 217]; // %15 daha koyu beyaz
          const greyColor = [144, 144, 144]; // %20 daha açık gri
          
          const t = smoothstep(threshold - blendWidth, threshold, tRaw);
          r = whiteColor[0]*(1-t) + greyColor[0]*t;
          g = whiteColor[1]*(1-t) + greyColor[1]*t;
          b = whiteColor[2]*(1-t) + greyColor[2]*t;
        }
        
        // Kırmızı hedef noktası - gradyanlı ve %70 saydam
        if (dotTarget >= targetThreshold) {
          const targetColor = [255, 0, 0];
          const edgeFade = (dotTarget - targetThreshold) / (1 - targetThreshold);
          const t = smoothstep(0, 0.3, edgeFade) * 0.3; // Gradyan etkisi * %30 opaklık
          
          // Mevcut renk ile karışım
          r = r * (1-t) + targetColor[0] * t;
          g = g * (1-t) + targetColor[1] * t;
          b = b * (1-t) + targetColor[2] * t;
        }

        // Işıklandırma uygula
        const litColor = applyLighting([r, g, b], [nx, ny, nz]);
        r = litColor[0];
        g = litColor[1];
        b = litColor[2];

        const idx = (scanY * W + scanX) * 4;
        data[idx] = r|0;
        data[idx+1] = g|0;
        data[idx+2] = b|0;
        data[idx+3] = 255;
      }
    }

    ctx.putImageData(img, 0, 0);
  }

  drawSphere();
})();
</script>
</body>
</html>
